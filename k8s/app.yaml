apiVersion: v1
kind: Service
metadata:
  name: linguist-app
  namespace: linguist
spec:
  selector:
    app: linguist-app
  ports:
    - port: 3000
      targetPort: 3000
      nodePort: 30000
  type: NodePort
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: linguist-app
  namespace: linguist
spec:
  replicas: 1
  selector:
    matchLabels:
      app: linguist-app
  template:
    metadata:
      labels:
        app: linguist-app
    spec:
      containers:
        - name: app
          image: linguist:latest
          imagePullPolicy: Never
          ports:
            - containerPort: 3000
          envFrom:
            - secretRef:
                name: linguist-secrets
          livenessProbe:
            httpGet:
              path: /api/health
              port: 3000
            initialDelaySeconds: 45
            periodSeconds: 15
            timeoutSeconds: 10
            failureThreshold: 5
          readinessProbe:
            httpGet:
              path: /api/health
              port: 3000
            initialDelaySeconds: 15
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 5
          resources:
            requests:
              memory: '256Mi'
              cpu: '250m'
            limits:
              memory: '512Mi'
              cpu: '1000m'
