# K8s Secret — populate with your actual values before applying
# DO NOT commit real secrets to git
apiVersion: v1
kind: Secret
metadata:
  name: linguist-secrets
  namespace: linguist
type: Opaque
stringData:
  DATABASE_URL: 'postgresql://linguist:linguist@postgres:5432/linguist'
  REDIS_URL: 'redis://redis:6379'
  AGODA_GENAI_API_KEY: 'your-genai-api-key'
  GENAI_BASE_URL: 'https://genai-gateway.agoda.is/v1'
  PUBLIC_SUPABASE_URL: 'https://your-project.supabase.co'
  PUBLIC_SUPABASE_ANON_KEY: 'your-supabase-anon-key'
  ADMIN_SUPABASE_USER_ID: 'your-admin-user-id'
