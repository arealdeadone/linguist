services:
  postgres:
    image: postgres:17-alpine
    container_name: linguist-test-postgres
    environment:
      POSTGRES_DB: linguist
      POSTGRES_USER: linguist
      POSTGRES_PASSWORD: linguist
    tmpfs:
      - /var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U linguist']
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: linguist-test-redis
    command: redis-server --maxmemory 64mb --maxmemory-policy allkeys-lru

  test-runner:
    build:
      context: .
      dockerfile: Dockerfile.test
    container_name: linguist-test-runner
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    environment:
      DATABASE_URL: postgresql://linguist:linguist@postgres:5432/linguist
      REDIS_URL: redis://redis:6379
      AI_MODE: mock
      NODE_ENV: test
      VITEST_GLOBAL_SETUP: skip
